# SAM deploy config. CI passes GoogleClientId/AllowedExtensionOrigin explicitly; these defaults are
# for manual deploys. Replace the placeholder client id before deploying by hand.
version = 0.1

[default.deploy.parameters]
stack_name = "tldr-app"
region = "il-central-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = true
parameter_overrides = "GoogleClientId=\"REPLACE_WITH_GOOGLE_WEB_CLIENT_ID\" AllowedExtensionOrigin=\"*\""

[default.build.parameters]
cached = true
parallel = true

# Dev/sandbox app stack. Same account, same region, same build settings as prod — it differs from the
# default (prod) config in only TWO things: the stack name and Environment="dev". SAM config envs do
# NOT inherit from one another, so a `[dev.*]` section would have to repeat every default field just to
# change those two — pure duplication. Instead, deploy dev as "default + two flags":
#   sam build
#   sam deploy --stack-name tldr-app-dev \
#     --parameter-overrides "GoogleClientId=<web-client-id> AllowedExtensionOrigin=* EmailHashSalt=<secret> Environment=dev"
# (Environment="dev" => a distinct table, tldr-comments-dev, so dev testing can never touch prod data.)
# This mirrors how CI deploys dev (explicit --stack-name + Environment, no config env). In CI the dev
# stack is the AUTO-deploy target: a push to main with server changes redeploys it; prod is a separate
# manual promotion. No dev CDN — point the dev extension build straight at the stack's ApiUrl output.
# Teardown: sam delete --stack-name tldr-app-dev (the table is Retain, so it survives as an orphan —
# delete tldr-comments-dev by hand if you want it gone).

# CDN stack (deploy AFTER the app stack; pass its ApiDomain output). Invoke with:
#   sam deploy --config-env cdn --template cdn-template.yaml --parameter-overrides ApiDomain=<app ApiDomain output>
[cdn.deploy.parameters]
stack_name = "tldr-cdn"
region = "il-central-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = true
