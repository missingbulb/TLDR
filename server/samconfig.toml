# SAM deploy config. One codified section per environment — deliberately NOT factored into a single
# parametric definition: each environment's stack name (and therefore its identity) is spelled out
# here, not chosen by a flag at invocation. CI injects the secret/variable parameters (GoogleClientId,
# EmailHashSalt) via --parameter-overrides; the placeholders below are for manual deploys.
#
# The template derives "which environment" from the STACK NAME (see template.yaml Conditions): the
# canonical `tldr-app` stack is prod and its table is pinned to `tldr-comments`; any other stack name
# is non-prod and gets a stack-scoped table (tldr-app-dev => tldr-app-dev-comments). So the ONLY thing
# that distinguishes prod from dev here is `stack_name` — there's no Environment parameter to pass.
version = 0.1

# --- prod (the canonical, strict stack) ---------------------------------------------------------
[default.deploy.parameters]
stack_name = "tldr-app"
region = "il-central-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = true
parameter_overrides = "GoogleClientId=\"REPLACE_WITH_GOOGLE_WEB_CLIENT_ID\" AllowedExtensionOrigin=\"*\""

[default.build.parameters]
cached = true
parallel = true

# --- dev/sandbox (same account & region; distinct stack => distinct table) ----------------------
# Deploy with `sam deploy --config-env dev`. In CI this stack is the AUTO-deploy target (a push to main
# with server changes redeploys it; prod is a separate manual promotion). No dev CDN — point the dev
# extension build straight at this stack's ApiUrl output. Teardown: `sam delete --config-env dev` (the
# table is Retain, so it survives as an orphan — delete tldr-app-dev-comments by hand if you want it gone).
[dev.deploy.parameters]
stack_name = "tldr-app-dev"
region = "il-central-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = true
parameter_overrides = "GoogleClientId=\"REPLACE_WITH_GOOGLE_WEB_CLIENT_ID\" AllowedExtensionOrigin=\"*\""

[dev.build.parameters]
cached = true
parallel = true

# CDN stack (deploy AFTER the app stack; pass its ApiDomain output). Invoke with:
#   sam deploy --config-env cdn --template cdn-template.yaml --parameter-overrides ApiDomain=<app ApiDomain output>
[cdn.deploy.parameters]
stack_name = "tldr-cdn"
region = "il-central-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = true
