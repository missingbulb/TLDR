AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  TLDR backend (app stack) — HTTP API v2 + Google JWT authorizer, one Lambda, DynamoDB single table.
  The CDN (CloudFront) lives in a SEPARATE stack (cdn-template.yaml) so its ~15-20 min propagation
  never slows this fast-iterating stack.

Parameters:
  GoogleClientId:
    Type: String
    # Intentionally no default: an empty JWT-authorizer audience would accept ID tokens minted for
    # ANY Google app. This MUST be the Google Cloud OAuth "Web application" client id.
    Description: Google OAuth "Web application" client id — the JWT authorizer audience (also the extension's auth client_id).
    AllowedPattern: '.+'
    ConstraintDescription: GoogleClientId must be provided.
  AllowedExtensionOrigin:
    Type: String
    Default: '*'
    Description: >
      CORS allowed origin. Keep '*': API Gateway HTTP API v2 REJECTS the chrome-extension:// scheme in CORS
      AllowOrigins ("Invalid format for origin"), so the extension origin can't be set here. Not a security
      gap — writes are gated by the JWT authorizer and reads are public; the '*' is also what lets the
      extension reach the API under standard CORS (so it needs no host_permissions). The security boundary is
      the JWT authorizer, never browser CORS. (See dev/docs/architecture.md §6.3 / §12-A9 / §12-A10.)
  RateLimitPerMinute:
    Type: Number
    Default: 10
    Description: Max comments one author may post per minute (enforced by a TTL'd DynamoDB counter). 0 disables.
  MaxBodyBytes:
    Type: Number
    Default: 8192
  QueryLimit:
    Type: Number
    Default: 50
  EmailHashSalt:
    Type: String
    Default: ''
    NoEcho: true
    Description: >
      Server secret salting the stored one-way email hash (used for moderation only; the hash is never
      returned). Set to a long random string; rotating it disconnects old hashes from new ones.

Conditions:
  # Which environment this is, is derived from the STACK NAME — not an external parameter. Production
  # is the one canonical stack named `tldr-app`; its table name is then pinned (below) to the exact
  # legacy `tldr-comments`. Nothing passed at deploy time can make prod point at a different table.
  # Any other stack name (tldr-app-dev, or an ad-hoc tldr-app-<x>) is non-prod and gets its own
  # stack-scoped table, so dev/sandbox testing can never read or write prod data.
  IsProd: !Equals [!Ref AWS::StackName, tldr-app]

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
        TABLE_NAME: !Ref CommentsTable
        MAX_BODY_BYTES: !Ref MaxBodyBytes
        QUERY_LIMIT: !Ref QueryLimit
        RATE_LIMIT_PER_MINUTE: !Ref RateLimitPerMinute
        EMAIL_HASH_SALT: !Ref EmailHashSalt

Resources:
  CommentsTable:
    Type: AWS::DynamoDB::Table
    # The one irreplaceable-state resource. Retain on delete AND on replace; PITR for restore-to-second.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # prod (stack tldr-app) => the exact legacy name, HARD-CODED in source so it can't be overridden
      # from outside (renaming would REPLACE the table — see UpdateReplacePolicy and the frozen-KeySchema
      # note below). Any other stack => a stack-scoped table (e.g. tldr-app-dev => tldr-app-dev-comments),
      # so it's physically distinct from prod's data store.
      TableName: !If [IsProd, tldr-comments, !Sub '${AWS::StackName}-comments']
      BillingMode: PAY_PER_REQUEST
      # FROZEN: editing the base table's KeySchema / AttributeDefinitions for pageId/commentId REPLACES
      # the table — a new EMPTY table; the data does NOT follow. Treat any changeset showing
      # "Replacement: True" here as a hard stop. Adding a GSI (below) is a separate, additive
      # UpdateTable operation — it does NOT touch the base KeySchema and does not replace the table.
      AttributeDefinitions:
        - AttributeName: pageId
          AttributeType: S
        - AttributeName: commentId
          AttributeType: S
        - AttributeName: categoryPageId
          AttributeType: S
        - AttributeName: voteCount
          AttributeType: N
      KeySchema:
        - AttributeName: pageId
          KeyType: HASH
        - AttributeName: commentId
          KeyType: RANGE
      # Issue #26 (link-hover preview): "the leading comment for pageId+category" needs a query the
      # base table can't answer (its only key is pageId+commentId, sorted by creation time, not votes).
      # `categoryPageId` (= "<pageId>#<category>") is written ONLY on comment items (handler.mjs), so
      # this GSI is naturally SPARSE — vote items and rate-limit counters never carry it and so never
      # appear here. `voteCount` already updates atomically via the existing vote TransactWriteItems
      # (handleVote), so the GSI tracks it with no new write path. A Query keyed on categoryPageId with
      # ScanIndexForward=false, Limit=1 returns the top-voted comment; ties (equal top voteCount) break
      # arbitrarily (DynamoDB's tie order, not a documented contract) — acceptable for a "leading
      # comment" preview. KNOWN LIMITATION: a GSI only indexes items that already carry its key
      # attributes, so comments written BEFORE this shipped are invisible to this index until rewritten
      # — there is no backfill (dev/docs/architecture.md §5.3).
      GlobalSecondaryIndexes:
        - IndexName: CategoryRankIndex
          KeySchema:
            - AttributeName: categoryPageId
              KeyType: HASH
            - AttributeName: voteCount
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # Per-author rate-limit counter items carry an `expiresAt` (epoch seconds) and self-delete.
      # Real comment items have no such attribute, so TTL never touches them.
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true

  CommentsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # API Gateway answers the CORS preflight (OPTIONS) itself, unauthenticated, before routing.
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedExtensionOrigin
        AllowMethods:
          - GET
          - POST
          # DELETE is the vote toggle-off (RemoveVote, issue #22). Without it here the browser's
          # preflight for a DELETE gets no Access-Control-Allow-Origin and un-voting fails with a CORS
          # error ("No 'Access-Control-Allow-Origin' header… / Failed to fetch") — visible only in a
          # real browser, never in a unit test.
          - DELETE
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
          # The client attaches X-Client-Version (version telemetry, issue #29) to every request. A
          # custom header makes even the public GET a non-simple request, so the browser preflights
          # it — this MUST list the header or the preflight fails and reads/posts break in-browser.
          - x-client-version
        MaxAge: 600
      Auth:
        Authorizers:
          GoogleJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: https://accounts.google.com
              audience:
                - !Ref GoogleClientId
        # No DefaultAuthorizer: routes opt in. GET /comments stays PUBLIC so CloudFront cache hits
        # (which bypass the origin/authorizer entirely) are never "authenticated" only on a miss.

  CommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      # The esbuild builder writes a single entry point to <artifact>/handler.js (the src/ prefix is
      # stripped — esbuild's default outbase is the entry's own dir), so the Handler is handler.handler.
      Handler: handler.handler
      Events:
        PostComment:
          Type: HttpApi
          Properties:
            ApiId: !Ref CommentsApi
            Method: POST
            Path: /comments
            Auth:
              Authorizer: GoogleJwt
        GetComments:
          Type: HttpApi
          Properties:
            ApiId: !Ref CommentsApi
            Method: GET
            Path: /comments
            # No Auth => public read.
        GetTopComment:
          Type: HttpApi
          Properties:
            ApiId: !Ref CommentsApi
            Method: GET
            Path: /comments/top
            # No Auth => public read, same as GetComments (issue #26, the CategoryRankIndex GSI above).
        CastVote:
          Type: HttpApi
          Properties:
            ApiId: !Ref CommentsApi
            Method: POST
            Path: /comments/{commentId}/vote
            Auth:
              Authorizer: GoogleJwt
        RemoveVote:
          Type: HttpApi
          Properties:
            ApiId: !Ref CommentsApi
            Method: DELETE
            Path: /comments/{commentId}/vote
            Auth:
              Authorizer: GoogleJwt
      Policies:
        - Statement:
            - Effect: Allow
              # Voting writes two items in one TransactWriteItems (the vote item + the comment's
              # voteCount); a toggle-off deletes the vote item. DynamoDB authorizes a transaction by
              # its UNDERLYING per-item actions (there is no dynamodb:TransactWriteItems action), so
              # PutItem/UpdateItem/DeleteItem together cover both votes and posts. (issue #22)
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
              # A GSI Query is authorized against the INDEX's own ARN, not just the table's (issue #26,
              # GetTopComment querying CategoryRankIndex) — the table ARN alone is insufficient for that.
              Resource:
                - !GetAtt CommentsTable.Arn
                - !Sub '${CommentsTable.Arn}/index/CategoryRankIndex'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handler.mjs
        Target: node22
        Format: cjs
        Minify: true
        Sourcemap: true
        # Bundle the AWS SDK: the managed runtime does NOT ship @aws-sdk/lib-dynamodb, and its
        # @aws-sdk minor drifts across runtime patches. Bundling makes the artifact deterministic.
        External: []

  # Pre-create the log group so we own its retention (Lambda's auto-created group never expires).
  CommentsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${CommentsFunction}
      RetentionInDays: 30

Outputs:
  ApiUrl:
    Description: Base URL for the API (dev/no-CDN). Clients POST/GET <ApiUrl>/comments.
    Value: !Sub https://${CommentsApi}.execute-api.${AWS::Region}.amazonaws.com
  ApiDomain:
    Description: API host only (no scheme) — pass this as ApiDomain to the CDN stack (cdn-template.yaml).
    Value: !Sub ${CommentsApi}.execute-api.${AWS::Region}.amazonaws.com
  CommentsTableName:
    Value: !Ref CommentsTable
