name: deploy

# Deploys the server app stack to AWS via GitHub OIDC (no stored keys). The job is GATED on the
# repository VARIABLE AWS_DEPLOY_ROLE_ARN: until the owner sets it (and GOOGLE_CLIENT_ID), the job is
# SKIPPED (gray) — never a red failure. (A variable, not a secret, because secrets aren't readable in
# a job-level `if:`, so a secret gate can't skip cleanly. The role ARN is not sensitive.)
#
# Promotion model: a push to main with server changes auto-deploys DEV (the always-current sandbox),
# so every merged server change is immediately exercisable end-to-end. PROD is NEVER automatic — it's
# a deliberate manual promotion (workflow_dispatch, environment: prod) you run once a change has been
# verified in dev.
#
# Account model: DEV and PROD live in SEPARATE AWS ACCOUNTS (dev/docs/dev-account-runbook.md). Each account
# has its own GitHub-OIDC deploy role trusting this repo+branch, so the job assumes a role PER ENVIRONMENT:
# prod => AWS_DEPLOY_ROLE_ARN (prod account), dev => AWS_DEV_DEPLOY_ROLE_ARN (dev account). Until the dev role
# variable is set, dev FALLS BACK to AWS_DEPLOY_ROLE_ARN, so this is a no-op before the dev account exists.
# Both roles trust refs/heads/main, so neither trust policy changes.

on:
  # Push to main that changes something the app stack actually DEPLOYS => auto-deploy DEV only (prod is
  # manual, via workflow_dispatch below). This is an allowlist on purpose: only the deploy inputs — the
  # template, the Lambda source + its deps, the deploy config, and the shared canonical sources — should
  # trigger a deploy. Tests, dev scripts, and the README are intentionally excluded, so a docs/test-only
  # commit doesn't spin up a whole deploy job just to produce an empty changeset.
  push:
    branches: [main]
    paths:
      - 'server/template.yaml'
      - 'server/samconfig.toml'
      - 'server/src/**'
      - 'server/package.json'
      - 'server/package-lock.json'
      - 'shared/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy. prod = deliberate promotion (tldr-app); dev = sandbox (tldr-app-dev).'
        type: choice
        options: [prod, dev]
        default: prod

permissions:
  id-token: write # assume the AWS role via OIDC
  contents: read

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' && vars.GOOGLE_CLIENT_ID != '' }}
    steps:
      - uses: actions/checkout@v5

      # Resolve the target environment once. A push to main auto-deploys DEV; a manual dispatch honors
      # its input (prod = the deliberate promotion). Each env maps to a codified samconfig section
      # (prod => default, dev => dev), which carries the stack name — the template derives prod-vs-dev
      # from that stack name, so there's no Environment parameter to pass. The env also selects WHICH
      # ACCOUNT'S OIDC role to assume (prod vs dev account); dev falls back to the prod role until the
      # dev-account role variable exists. Both roles trust refs/heads/main, so neither stays un-scoped.
      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          else
            ENV="dev"
          fi
          if [ "$ENV" = "prod" ]; then
            CONFIG="default"; STACK="tldr-app"; ROLE="${{ vars.AWS_DEPLOY_ROLE_ARN }}"
          else
            CONFIG="$ENV"; STACK="tldr-app-$ENV"; ROLE="${{ vars.AWS_DEV_DEPLOY_ROLE_ARN }}"
          fi
          # Pre-migration fallback: no dedicated dev-account role yet => use the prod-account role.
          if [ -z "$ROLE" ]; then ROLE="${{ vars.AWS_DEPLOY_ROLE_ARN }}"; fi
          if [ -z "$ROLE" ]; then
            echo "::error::No deploy role configured for env '$ENV' (set AWS_DEPLOY_ROLE_ARN / AWS_DEV_DEPLOY_ROLE_ARN)."
            exit 1
          fi
          echo "name=$ENV" >> "$GITHUB_OUTPUT"
          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          echo "stack=$STACK" >> "$GITHUB_OUTPUT"
          echo "role=$ROLE" >> "$GITHUB_OUTPUT"
          echo "Deploying environment '$ENV' (samconfig env '$CONFIG') to stack '$STACK'." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      # SAM's esbuild builder needs esbuild on PATH (its scratch install is production-only).
      - name: Install esbuild on PATH (for SAM's esbuild builder)
        run: npm install -g esbuild@0.24.0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: il-central-1

      - name: sam build
        working-directory: server
        run: sam build

      - name: sam deploy (app stack)
        working-directory: server
        run: |
          sam deploy --config-env ${{ steps.env.outputs.config }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "GoogleClientId=${{ vars.GOOGLE_CLIENT_ID }} AllowedExtensionOrigin=${{ vars.ALLOWED_EXTENSION_ORIGIN || '*' }} EmailHashSalt=${{ secrets.EMAIL_HASH_SALT }}"

      # Stack termination protection can't be expressed in the template body; set it via the API after
      # deploy. Idempotent — re-enabling an already-protected stack is a no-op — so it runs every deploy.
      # prod only: the dev stack must stay deletable (`sam delete --config-env dev`) for teardown.
      - name: Enable termination protection on the app stack
        if: ${{ steps.env.outputs.name == 'prod' }}
        run: |
          aws cloudformation update-termination-protection \
            --enable-termination-protection \
            --stack-name ${{ steps.env.outputs.stack }} \
            --region il-central-1
