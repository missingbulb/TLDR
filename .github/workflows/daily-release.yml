name: "Release: Daily Auto-Release"

# Thin stub of the chrome-extension-release standard: the logic lives in the
# Claudinite canon as a reusable workflow (referenced @main, so canon changes
# apply here automatically). This file owns only the schedule/dispatch
# triggers, the concurrency guard, and this repo's values — forwarding the
# same gate, build, and config injection the release stub passes.
#
# What the workflow does — the shipped-file diff against the latest release
# tag, the patch bump pushed to main, the calls into the release and publish
# workflows — is documented in the called workflow. Both commands below are
# dependency-free (they run on a bare runner, no npm ci).
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

# A manual dispatch overlapping the scheduled run would race the bump-push;
# queue it instead.
concurrency: daily-release

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  daily-release:
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-daily-release.yml@main
    with:
      bump_command: node client/scripts/bump-patch-version.mjs .
      filter_command: node client/scripts/filter-shipped-paths.mjs
      zip_path: client/dist/tldr.zip
      zip_name: tldr.zip
      manifest_path: client/manifest.json
      package_json_path: client/package.json
      setup_command: ""
      test_command: |
        npm test
        cd client && npm test
      build_command: cd client && npm run build
      build_env: |
        API_BASE_URL=${{ vars.API_BASE_URL }}
        GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
        EXTENSION_PUBLIC_KEY=${{ vars.EXTENSION_PUBLIC_KEY }}
    secrets: inherit
