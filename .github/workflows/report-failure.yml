name: Report workflow failure

# Reusable failure reporter for UNATTENDED workflows — ones with no human
# actively watching the run, so a red entry in the Actions list alerts nobody.
# It converges such a failure to a human-visible state by opening (or, if one is
# already open, commenting on) a standing per-workflow tracking issue.
#
# A caller adds a job that fires only on failure:
#
#   report-failure:
#     needs: <the-job(s)-that-can-fail>
#     if: failure()
#     permissions:
#       issues: write          # the called workflow's token is capped by this
#     uses: ./.github/workflows/report-failure.yml
#     with:
#       workflow: "<this workflow's name>"   # keys the tracking issue
#
# PR CI deliberately does NOT use this: its failures are loud already — a red
# required check on the PR, blocking merge, with the author watching. The rule
# is the unattended-workflow escalation practice in the Claudinite canon
# (tasks/git-and-github.md).
on:
  workflow_call:
    inputs:
      workflow:
        description: "Name of the failing workflow; the tracking issue is keyed on it."
        required: true
        type: string

permissions:
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Open or update the failure tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          WORKFLOW: ${{ inputs.workflow }}
          # github.* here refers to the overall run, so this is the caller's run.
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          title="⚠️ Workflow failing: ${WORKFLOW}"

          # Create the label idempotently — GitHub won't make it on demand, and a
          # list filtered by a non-existent label errors.
          gh label create workflow-failure --repo "$REPO" --color B60205 \
            --description "An unattended workflow failed and needs a human" \
            2>/dev/null || true

          # One standing issue per workflow, found by EXACT title. Match in jq
          # rather than via --search so it's deterministic (no search-index lag);
          # --state all reuses a CLOSED issue too, so a recurrence reopens the
          # same thread instead of duplicating it.
          num="$(gh issue list --repo "$REPO" --label workflow-failure --state all \
            --json number,title --limit 100 \
            -q "map(select(.title == \"$title\")) | .[0].number // empty")"

          if [ -n "$num" ]; then
            gh issue reopen "$num" --repo "$REPO" 2>/dev/null || true
            gh issue comment "$num" --repo "$REPO" \
              --body "Failed again: [view run](${RUN_URL})."
            echo "Commented on existing tracking issue #$num."
          else
            gh issue create --repo "$REPO" --title "$title" --label workflow-failure --body "$(
              printf '%s\n' \
                "The **${WORKFLOW}** workflow failed: [view run](${RUN_URL})." \
                "" \
                "This is a standing tracking issue for that workflow's failures — each new failure adds a comment here. Close it once the cause is fixed; the next failure reopens it."
            )"
            echo "Opened a new tracking issue."
          fi
