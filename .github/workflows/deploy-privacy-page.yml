name: Deploy privacy policy to GitHub Pages

# Thin stub of the chrome-extension-release standard: the logic lives in the
# Claudinite canon as a reusable workflow (referenced @main, so canon changes
# apply here automatically; the workflow itself is platform-agnostic — any
# publish standard's listing can use it).
#
# Dispatch this to make https://<owner>.github.io/<repo>/privacy/ live WITHOUT
# uploading anything to the store (e.g. before the first store submission —
# the store fetches the URL at every publish and fails on an unreachable
# link). The store-publish canon workflow also refreshes the page on every
# upload, through the canon directly — not through this stub.
#
# One-time owner setup: Pages source = "GitHub Actions" (repo Settings →
# Pages).
#
# Per-repo substitution points (chrome-extension-release standard): none — the
# PRIVACY.md path is the standard location (a repo that moved it passes
# privacy_md_path).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

jobs:
  deploy:
    uses: missingbulb/Claudinite/.github/workflows/deploy-privacy-page.yml@main
