name: "Release: Create Package"

# Thin stub of the chrome-extension-release standard: the logic lives in the
# Claudinite canon as a reusable workflow (referenced @main, so canon changes
# apply here automatically). This file owns only the triggers and this repo's
# values: the client/ paths, the no-install two-level test gate, and the
# release-config injection (repo variables exported via build_env — the canon
# fails the run if any is unset, so a dev-pointed placeholder zip can never
# ship; see dev/docs/go-live-runbook.md).
#
# Cutting a release is merging a version bump to main (the push trigger below);
# it's also runnable from the Actions tab.
on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - client/manifest.json

permissions:
  contents: write
  issues: write

jobs:
  release:
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-release.yml@main
    with:
      zip_path: client/dist/tldr.zip
      manifest_path: client/manifest.json
      package_json_path: client/package.json
      setup_command: ""
      test_command: |
        npm test
        cd client && npm test
      build_command: cd client && npm run build
      build_env: |
        API_BASE_URL=${{ vars.API_BASE_URL }}
        GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
        EXTENSION_PUBLIC_KEY=${{ vars.EXTENSION_PUBLIC_KEY }}
