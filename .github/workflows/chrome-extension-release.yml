name: Release

# The ONE thin stub of the chrome-extension-release standard. All the logic —
# create-package, daily auto-release, and Chrome Web Store publish — lives in the
# Claudinite canon as reusable workflows (referenced @main, so canon changes
# apply here automatically). This file owns only the triggers and, because TLDR
# is a monorepo whose client build bakes in release config, the one per-repo
# thing the standard keeps in the stub: the build_env block below. Every other
# repo-specific value is declared explicitly in the REQUIRED `.github/release.config`
# (six keys, no defaults): the extension/ manifest + package.json paths, the
# two-level test gate, the extension/dist zip path, and the curated ship_paths. The
# zip asset name is derived from zip_path and the build is always `npm run build`.
#
# Three operations, one file:
#   * push to main            → create-package (a clean no-op unless the manifest
#                               version was bumped, so ordinary pushes don't cut a
#                               release)
#   * schedule (03:00 UTC)    → daily auto-release (ship a store update if a
#                               shipped file changed since the last release)
#   * "Run workflow" dispatch → pick a mode: publish (default), package, or daily
#
# The Actions-tab entry is named "Release"; the failure reporter keys its
# tracking issues on the per-operation names ("Release: Create Package", etc.)
# baked into the canon reusable workflows.
#
# build_env: the client build injects these from repository VARIABLES (Settings →
# Secrets and variables → Actions → Variables). Every listed key must be
# non-empty or the run fails, so a dev-pointed placeholder zip can never ship.
# secrets: inherit passes the four CHROME_* store secrets through to the canon.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        options: [publish, package, daily]
        default: publish
      tag:
        description: "publish: release tag to publish (blank = latest release)"
        required: false
        type: string
      auto_publish:
        description: "publish: publish to users after upload (uncheck = dashboard draft)"
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

# Daily runs (scheduled, or a mode=daily dispatch) share one queue so a manual
# dispatch can't race the scheduled bump-push; every other run gets its own group.
concurrency: >-
  ${{ (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily'))
      && 'daily-release' || github.run_id }}

jobs:
  create-package:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'package')
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-release.yml@main
    with:
      build_env: |
        API_BASE_URL=${{ vars.API_BASE_URL }}
        GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
        EXTENSION_PUBLIC_KEY=${{ vars.EXTENSION_PUBLIC_KEY }}

  publish:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'publish'
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-publish-store.yml@main
    with:
      tag: ${{ inputs.tag }}
      auto_publish: ${{ inputs.auto_publish }}
    secrets: inherit

  daily:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily')
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-daily-release.yml@main
    with:
      build_env: |
        API_BASE_URL=${{ vars.API_BASE_URL }}
        GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
        EXTENSION_PUBLIC_KEY=${{ vars.EXTENSION_PUBLIC_KEY }}
    secrets: inherit
