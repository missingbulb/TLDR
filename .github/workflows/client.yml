name: client

on:
  pull_request:
    branches: [main]
    paths: ['client/**', 'shared/**', 'dev/build/**', '.github/workflows/client.yml']
  push:
    branches: [main, 'claude/**']
    paths: ['client/**', 'shared/**', 'dev/build/**', '.github/workflows/client.yml']

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # Repo-level checks: the URL-normalizer corpus + the shared drift guard (root, no deps).
      - name: Repo-level tests
        run: npm test

      - name: Validate manifest.json is parseable
        run: node -e "JSON.parse(require('fs').readFileSync('client/manifest.json'))"

      # The client has no runtime/test dependencies (the UI requirements suite + its deps live in dev/).
      - name: Client tests (logic + manifest/packaging guards)
        working-directory: client
        run: npm test

      # The chrome.* glue can't run under node; syntax-check it so a typo can't ship.
      - name: Syntax-check extension modules
        run: |
          for f in client/src/*.mjs client/config.mjs; do node --check "$f"; done

      - name: Build the extension zip
        working-directory: client
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: tldr
          path: client/dist/tldr.zip
          if-no-files-found: error
