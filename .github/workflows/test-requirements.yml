name: "test: requirements"

# The executable-requirements suite (dev/requirements/) — the cross-tier product spec. It renders the
# real client UI under jsdom (dom/behavior/logic kinds) and runs the real server handler (server kind),
# so it triggers on the spec, the dev deps, and the extension/server sources it exercises.

on:
  pull_request:
    branches: [main]
    paths:
      - 'dev/requirements/**'
      - 'dev/package.json'
      - 'dev/package-lock.json'
      - 'extension/src/**'
      - 'extension/manifest.json'
      - 'extension/config.mjs'
      - 'server/src/**'
      - 'shared/**'
      - '.github/workflows/test-requirements.yml'
  push:
    branches: [main, 'claude/**']
    paths:
      - 'dev/requirements/**'
      - 'dev/package.json'
      - 'dev/package-lock.json'
      - 'extension/src/**'
      - 'extension/manifest.json'
      - 'extension/config.mjs'
      - 'server/src/**'
      - 'shared/**'
      - '.github/workflows/test-requirements.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dev/package-lock.json

      # The `server` kind imports the real handler, whose AWS-SDK deps resolve from server/node_modules.
      - name: Install server dependencies (for the server kind)
        working-directory: server
        run: npm ci

      - name: Install dev dependencies (jsdom + the render stack)
        working-directory: dev
        run: npm ci

      - name: Executable-requirements suite (UI + server)
        working-directory: dev
        run: npm test
